document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"dd827388-ff73-45a8-b1f2-f29803385c6d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"18d762cf-21ca-4878-a4c5-5afcd597f6b3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --navy:#0B1120; --navy-2:#0E1426; --charcoal:#111827;\n    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.14);\n    --ink:#F8FAFC; --ink-dim:#B7BECC; --ink-mute:#7A8295;\n    --gold:#C9A66B; --gold-2:#E7C68A;\n    --emerald:#10B981; --royal:#2563EB;\n    --shadow-1: 0 1px 0 rgba(255,255,255,.04) inset, 0 10px 30px rgba(0,0,0,.35);\n    --shadow-2: 0 20px 60px rgba(0,0,0,.45), 0 2px 0 rgba(255,255,255,.04) inset;\n    --shadow-card: 0 30px 80px -20px rgba(0,0,0,.6), 0 8px 24px rgba(0,0,0,.35);\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{\n    background:var(--navy); color:var(--ink);\n    font-family:\"Manrope\", ui-sans-serif, system-ui, sans-serif;\n    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;\n    overflow-x:hidden;\n  }\n  img{max-width:100%; display:block}\n  a{color:inherit; text-decoration:none}\n  button{font-family:inherit; cursor:pointer; border:0; background:none; color:inherit}\n  .container{max-width:1280px; margin:0 auto; padding:0 28px}\n  .eyebrow{\n    font-size:11px; letter-spacing:.22em; text-transform:uppercase;\n    color:var(--gold); font-weight:500;\n    display:inline-flex; align-items:center; gap:10px;\n  }\n  .eyebrow::before{content:\"\"; width:22px; height:1px; background:var(--gold); opacity:.7}\n\n  /* NAV */\n  .nav{\n    position:fixed; top:18px; left:50%; transform:translateX(-50%);\n    width:min(1280px, calc(100% - 32px));\n    z-index:60;\n    display:flex; align-items:center; justify-content:space-between;\n    padding:14px 22px;\n    background:rgba(11,17,32,.78);\n    border:1px solid var(--line-strong);\n    backdrop-filter: blur(18px) saturate(140%);\n    border-radius:999px;\n    box-shadow: var(--shadow-1);\n  }\n  .brand{display:flex; align-items:center; gap:12px; font-weight:600}\n  .brand-logo{ height:48px; width:auto; display:block; filter: brightness(1.05) }\n  .nav .brand{ margin: -6px 0 }\n  .nav-links{display:flex; gap:32px; font-size:13.5px; color:var(--ink-dim); font-weight:500}\n  .nav-links a:hover{color:var(--ink)}\n  .nav-links a.active{color:var(--gold)}\n  .nav-actions{ display:flex; align-items:center; gap:16px }\n  .nav-list{ display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:var(--gold-2); transition:color .2s }\n  .nav-list:hover{ color:var(--gold) }\n  .nav-list svg{ width:14px; height:14px }\n  @media (max-width: 620px){ .nav-list{display:none} }\n  .nav-cta{\n    display:inline-flex; align-items:center; gap:8px;\n    padding:10px 18px; border-radius:999px;\n    background:var(--ink); color:var(--navy);\n    font-weight:600; font-size:13px;\n    transition:background .2s, transform .2s;\n  }\n  .nav-cta:hover{background:var(--gold-2); transform:translateY(-1px)}\n  .nav-cta svg{width:14px; height:14px}\n  @media (max-width: 920px){ .nav-links{display:none} }\n\n  /* BREADCRUMB */\n  .crumb{\n    padding: 130px 0 12px;\n    font-size:13px; color:var(--ink-mute); letter-spacing:.02em;\n    display:flex; align-items:center; gap:10px;\n  }\n  .crumb a:hover{color:var(--ink)}\n  .crumb .sep{ opacity:.4 }\n  .crumb .curr{ color:var(--ink-dim) }\n\n  /* PAGE HEADER */\n  .w-head{ padding: 18px 0 8px; display:flex; align-items:end; justify-content:space-between; gap:48px; flex-wrap:wrap }\n  .w-head h1{\n    font-family:\"Italiana\", serif; font-weight:400;\n    font-size: clamp(44px, 6.5vw, 92px); line-height:.98; letter-spacing:-.005em;\n    margin:18px 0 0; max-width:780px;\n  }\n  .w-head h1 em{ font-style:italic; color:var(--gold-2) }\n  .w-head p{ color:var(--ink-dim); max-width:380px; font-size:15.5px; line-height:1.6; margin:0 0 6px }\n\n  /* STATS STRIP */\n  .stats-strip{\n    display:grid; grid-template-columns: repeat(4, 1fr); gap:1px;\n    background:var(--line); border:1px solid var(--line);\n    border-radius:22px; overflow:hidden; margin:48px 0 0;\n  }\n  .stat{ background:var(--navy-2); padding:34px 30px; transition:background .3s ease }\n  .stat:hover{ background:var(--charcoal) }\n  .stat .num{ font-family:\"Italiana\", serif; font-size:clamp(40px,4.4vw,58px); line-height:1; letter-spacing:-.01em }\n  .stat .num span{ color:var(--gold-2) }\n  .stat .lab{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-mute); margin-top:14px }\n  @media (max-width: 760px){ .stats-strip{ grid-template-columns:1fr 1fr } }\n\n  /* STANDARDS */\n  .section-label{ margin: 96px 0 36px }\n  .section-label .eyebrow{ margin-bottom:14px }\n  .section-label h2{ font-family:\"Italiana\", serif; font-weight:400; font-size:clamp(32px,4vw,52px); line-height:1.02; margin:0; letter-spacing:-.005em }\n  .section-label h2 em{ font-style:italic; color:var(--gold-2) }\n\n  .w-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:18px; padding-bottom: 100px }\n  .feat{\n    background: var(--navy-2);\n    padding: 40px 32px 36px;\n    position:relative;\n    border:1px solid var(--line);\n    border-radius:22px;\n    box-shadow: var(--shadow-1);\n    transition: transform .4s cubic-bezier(.2,.7,.2,1), border-color .4s ease, box-shadow .4
